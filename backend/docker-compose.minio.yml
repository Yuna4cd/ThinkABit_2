services:
  minio:
    image: minio/minio:latest
    container_name: thinkabit-minio
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        sleep 1;
      done;
      mc mb --ignore-existing local/thinkabit-raw;
      echo 'Bucket thinkabit-raw is ready.';
      "
    restart: "no"

volumes:
  minio-data:
